<!DOCTYPE html>
<html>
<head>
    <title>{% if sensor %}Editar{% else %}Novo{% endif %} Sensor</title>
</head>
<body>
    <h1>{% if sensor %}Editar{% else %}Novo{% endif %} Sensor</h1>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <label>Nome</label>
            <input type="text" name="nome" value="{{ sensor.nome if sensor else '' }}" required>
        </div>
        <div>
            <label>Tipo</label>
            <select name="tipo" required>
                <option value="temperatura" {% if sensor and sensor.tipo == 'temperatura' %}selected{% endif %}>Temperatura</option>
                <option value="umidade" {% if sensor and sensor.tipo == 'umidade' %}selected{% endif %}>Umidade</option>
            </select>
        </div>
        <div>
            <label>Unidade</label>
            <input type="text" name="unidade" value="{{ sensor.unidade if sensor else '°C' }}">
        </div>
        <div>
            <label>Endereço</label>
            <input type="text" name="endereco" value="{{ sensor.endereco if sensor else '' }}">
        </div>
        <div>
            <label>Protocolo</label>
            <select name="protocolo">
                <option value="MODBUS" {% if sensor and sensor.protocolo == 'MODBUS' %}selected{% endif %}>MODBUS</option>
                <option value="MQTT" {% if sensor and sensor.protocolo == 'MQTT' %}selected{% endif %}>MQTT</option>
                <option value="HTTP" {% if sensor and sensor.protocolo == 'HTTP' %}selected{% endif %}>HTTP</option>
            </select>
        </div>
        <div>
            <label>Equipamento</label>
            <select name="equipamento_id" required>
                <option value="">-- Selecione --</option>
                {% for e in equipamentos %}
                <option value="{{ e.id }}" {% if sensor and sensor.equipamento_id == e.id %}selected{% endif %}>{{ e.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>Alerta Mínimo</label>
            <input type="number" step="0.1" name="alerta_min" value="{{ sensor.alerta_min if sensor else '' }}">
        </div>
        <div>
            <label>Alerta Máximo</label>
            <input type="number" step="0.1" name="alerta_max" value="{{ sensor.alerta_max if sensor else '' }}">
        </div>
        <div>
            <label>Ativo</label>
            <input type="checkbox" name="ativo" value="true" {% if sensor and sensor.ativo %}checked{% endif %}>
        </div>
        <button type="submit">Salvar</button>
        <a href="/admin/sensores">Cancelar</a>
    </form>
</body>
</html>
