<!DOCTYPE html>
<html>
<head>
    <title>{% if equip %}Editar{% else %}Novo{% endif %} Equipamento</title>
</head>
<body>
    <h1>{% if equip %}Editar{% else %}Novo{% endif %} Equipamento</h1>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <label>Nome</label>
            <input type="text" name="nome" value="{{ equip.nome if equip else '' }}" required>
        </div>
        <div>
            <label>Modelo</label>
            <input type="text" name="modelo" value="{{ equip.modelo if equip else '' }}">
        </div>
        <div>
            <label>Fabricante</label>
            <input type="text" name="fabricante" value="{{ equip.fabricante if equip else '' }}">
        </div>
        <div>
            <label>Número de Série</label>
            <input type="text" name="numero_serie" value="{{ equip.numero_serie if equip else '' }}">
        </div>
        <div>
            <label>Setor</label>
            <select name="setor_id" required>
                <option value="">-- Selecione --</option>
                {% for s in setores %}
                <option value="{{ s.id }}" {% if equip and equip.setor_id == s.id %}selected{% endif %}>{{ s.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">Salvar</button>
        <a href="/admin/equipamentos">Cancelar</a>
    </form>
</body>
</html>
