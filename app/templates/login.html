<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — OrbisClin Cold</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #06101E; }

    .login-card {
      background-color: #0B1F40;
      border: 1px solid #1A3050;
      border-radius: 1rem;
      padding: 1.75rem;
    }

    .form-label {
      display: block;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #93B4D4;
      margin-bottom: .4rem;
    }

    .form-input {
      width: 100%;
      background-color: #06101E;
      border: 1px solid #1E3A5F;
      border-radius: .5rem;
      padding: .65rem .9rem;
      font-size: .875rem;
      color: #E2EAF4;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .form-input:focus {
      border-color: #0891B2;
      box-shadow: 0 0 0 3px rgba(8,145,178,.2);
    }
    .form-input::placeholder { color: #3D5A78; }

    .btn-login {
      width: 100%;
      background-color: #0891B2;
      color: #fff;
      font-weight: 600;
      font-size: .875rem;
      padding: .65rem;
      border-radius: .5rem;
      border: none;
      cursor: pointer;
      transition: background-color .15s;
    }
    .btn-login:hover { background-color: #06B6D4; }

    .erro-box {
      background-color: rgba(185,28,28,.25);
      border: 1px solid rgba(185,28,28,.5);
      color: #FCA5A5;
      font-size: .875rem;
      padding: .6rem .875rem;
      border-radius: .5rem;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Marca Órbita -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <svg width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
          <ellipse cx="32" cy="32" rx="29" ry="9" fill="none" stroke="#0891B2" stroke-width="2" transform="rotate(-28 32 32)"/>
          <ellipse cx="32" cy="32" rx="29" ry="9" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="3,3" stroke-opacity="0.22" transform="rotate(42 32 32)"/>
          <circle cx="32" cy="32" r="13" fill="#1A4FA0"/>
          <line x1="32" y1="20" x2="32" y2="44" stroke="white" stroke-width="2"   stroke-linecap="round"/>
          <line x1="20" y1="32" x2="44" y2="32" stroke="white" stroke-width="2"   stroke-linecap="round"/>
          <line x1="23" y1="23" x2="41" y2="41" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="41" y1="23" x2="23" y2="41" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="58" cy="19" r="4"   fill="#0891B2"/>
          <circle cx="6"  cy="45" r="3"   fill="white" opacity="0.55"/>
        </svg>
      </div>
      <p style="color:#0891B2;font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;">OrbisClin</p>
      <h1 style="color:#ffffff;font-size:1.75rem;font-weight:800;line-height:1;margin-top:.2rem;">Cold</h1>
      <p style="color:#3D5A78;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;margin-top:.4rem;">Cold Chain Monitoring</p>
    </div>

    <!-- Formulário -->
    <div class="login-card">
      {% if erro %}
      <div class="erro-box">{{ erro }}</div>
      {% endif %}

      <form method="post" action="/auth/login">
        <div style="margin-bottom:1rem;">
          <label class="form-label" for="username">Usuário</label>
          <input class="form-input" id="username" name="username" type="text" required autofocus autocomplete="username">
        </div>

        <div style="margin-bottom:1.5rem;">
          <label class="form-label" for="password">Senha</label>
          <input class="form-input" id="password" name="password" type="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login">Entrar</button>
      </form>
    </div>

    <p style="text-align:center;color:#1E3A5F;font-size:.7rem;margin-top:1.5rem;">RDC 430/2020 ANVISA</p>
  </div>
</body>
</html>
