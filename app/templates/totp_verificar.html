<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificação 2FA — OrbisClin Cold</title>
  <script>tailwind.config={theme:{extend:{colors:{orbis:"#0E2F66",ccf:"#0891B2",ccflight:"#06B6D4"}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-orbis flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <p class="text-ccf font-bold text-xs tracking-widest uppercase">OrbisClin Cold</p>
      <h1 class="text-white font-extrabold text-2xl mt-1">Verificação 2FA</h1>
    </div>
    <form method="post" action="/auth/totp/verificar"
          class="bg-slate-800/60 border border-slate-700 rounded-2xl p-7 shadow-2xl">
      {% if erro %}
      <div class="bg-red-900/40 border border-red-700 text-red-300 text-sm px-3 py-2.5 rounded-lg mb-5">{{ erro }}</div>
      {% endif %}
      <p class="text-slate-400 text-sm mb-4">Digite o código de 6 dígitos do seu app autenticador.</p>
      <input name="codigo" type="text" inputmode="numeric" maxlength="6"
             pattern="[0-9]{6}" required autofocus
             class="w-full bg-slate-900/60 border border-slate-600 rounded-lg px-3.5 py-3
                    text-white text-3xl font-mono tracking-widest text-center mb-5
                    focus:outline-none focus:ring-2 focus:ring-ccf"
             placeholder="000000">
      <button type="submit"
              class="w-full bg-ccf hover:bg-ccflight text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
        Verificar
      </button>
      <a href="/auth/login" class="block text-center text-slate-500 hover:text-slate-300 text-xs mt-4 transition-colors">
        ← Voltar ao login
      </a>
    </form>
  </div>
</body>
</html>
